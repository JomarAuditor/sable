<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/sable-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Sable Cafe | Architectural Coffee & Brunch in the Philippines</title>
    <meta name="description" content="Sable is a specialty cafe designed for lingering — handcrafted coffee, comforting brunch plates, and artisanal bakes in a warm, architectural space. Come stay 1.5 to 4 hours." />
    <meta name="keywords" content="Sable cafe, specialty coffee Philippines, brunch cafe, architectural cafe, best cafe Manila, coffee shop Philippines, avocado toast, espresso, latte" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Sable Cafe" />
    <link rel="canonical" href="https://sablecafe.ph/" />

    <!-- Open Graph (Facebook, Instagram link previews) -->
    <meta property="og:type" content="restaurant" />
    <meta property="og:title" content="Sable — The Architectural Cafe" />
    <meta property="og:description" content="Handcrafted coffee, comforting meals, and fresh bakes. A space designed for lingering." />
    <meta property="og:image" content="/sable-storefront.jpg" />
    <meta property="og:url" content="https://sablecafe.ph/" />
    <meta property="og:site_name" content="Sable Cafe" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sable — The Architectural Cafe" />
    <meta name="twitter:description" content="Handcrafted coffee, comforting meals, and fresh bakes. A space designed for lingering." />
    <meta name="twitter:image" content="/sable-storefront.jpg" />

    <!-- Structured Data: Local Business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CafeOrCoffeeShop",
      "name": "Sable Cafe",
      "description": "An architectural specialty cafe offering handcrafted coffee, brunch plates, and fresh bakes. Designed for lingering.",
      "image": "/sable-storefront.jpg",
      "logo": "/sable-logo.png",
      "url": "https://sablecafe.ph",
      "servesCuisine": ["Coffee", "Brunch", "Western", "Filipino Fusion"],
      "priceRange": "₱₱",
      "menu": "https://sablecafe.ph/menu",
      "hasMap": "https://maps.google.com/?q=Sable+Cafe",
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "07:00",
          "closes": "18:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Saturday", "Sunday"],
          "opens": "08:00",
          "closes": "16:00"
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
